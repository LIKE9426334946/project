seed: 23
num_classes: 4 #! 四类
class_names: [class_0, class_1, class_2, class_3]

data:
  root: /kaggle/input/datasets/thenoart/project/project
  images_dir: not_define
  masks_dir: not_define
  image_size: [512, 512]
  num_workers: 4
  split_dir: runs/splits
  test_ratio: 0.2

model:
  name: unet_resnet34_attn
  in_channels: 3
  pretrained: true
  use_scse: true
  use_aspp: true
  use_deep_supervision: true
  use_boundary_branch: true

train:
  batch_size: 16
  epochs: 60
  lr: 0.0003
  weight_decay: 0.0001
  amp: true
  vis_samples: 4

scheduler:
  name: cosine
  min_lr: 1.0e-6

loss:
  name: ce_dice
  ce_weight: 1.0
  dice_weight: 0.5
  use_deep_supervision: true
  use_boundary_branch: true

runs:
  root: runs
other:
  name: deep-supervision
